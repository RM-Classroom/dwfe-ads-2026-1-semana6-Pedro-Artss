<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lothric Compendium - DS3</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dark text-light">

    <header class="cabecalho sticky-top border-bottom border-secondary shadow-sm py-4">
        <div class="container text-center">
            <h1 class="h2 text-gold text-uppercase mb-3">Dark Souls III: Bosses</h1>
            <nav class="nav justify-content-center">
                <a class="nav-link custom-link" href="#">Início</a>
                <a class="nav-link custom-link" href="#">Itens</a>
                <a class="nav-link custom-link" href="sobre.html">Sobre Nós</a>
                <a class="nav-link custom-link" href="https://store.steampowered.com/app/374320/DARK_SOULS_III/">Jogo</a>
            </nav>
        </div>
    </header>

    <main class="container my-5">
        <section class="busca p-4 mb-5 border border-secondary rounded shadow-sm">
            <h2 class="h4 text-center mb-4 text-gold">Encontre seu desafio</h2>
            <form class="row g-2 justify-content-center">
                <div class="col-12 col-md-4">
                    <input type="text" class="form-control bg-black text-white border-secondary" placeholder="Nome do Boss...">
                </div>
                <div class="col-12 col-md-3">
                    <select class="form-select bg-black text-white border-secondary">
                        <option>Principal</option>
                        <option>Opcional</option>
                    </select>
                </div>
                <div class="col-12 col-md-auto">
                    <button type="submit" class="btn btn-outline-gold w-100 px-4 fw-bold">Buscar</button>
                </div>
            </form>
        </section>

        <section class="row g-4 justify-content-center">
            <article class="col-12 col-sm-6 col-lg-4">
                <div class="card bg-black border-secondary h-100 custom-card">
                    <img src="Iudex_Gundyr_1.webp" class="card-img-top boss-img" alt="Iudex Gundyr">
                    <div class="card-body">
                        <h3 class="h5 text-gold">Iudex Gundyr</h3>
                        <p class="card-text mb-1 small"><strong>Drop:</strong> Alma do Gundyr</p>
                        <p class="card-text recompensa fw-bold">Almas: 3.000</p>
                    </div>
                </div>
            </article>

            <article class="col-12 col-sm-6 col-lg-4">
                <div class="card bg-black border-secondary h-100 custom-card">
                    <img src="ershao-guo-2019-06-14-5-08-00.jpg" class="card-img-top boss-img" alt="Vordt">
                    <div class="card-body">
                        <h3 class="h5 text-gold">Vordt of the Boreal Valley</h3>
                        <p class="card-text mb-1 small"><strong>Drop:</strong> Alma do Vordt</p>
                        <p class="card-text recompensa fw-bold">Almas: 3.000</p>
                    </div>
                </div>
            </article>

            <article class="col-12 col-sm-6 col-lg-4">
                <div class="card bg-black border-secondary h-100 custom-card">
                    <img src="lqh4cwn3iw4t.jpg" class="card-img-top boss-img" alt="Abyss Watchers">
                    <div class="card-body">
                        <h3 class="h5 text-gold">Abyss Watchers</h3>
                        <p class="card-text mb-1 small"><strong>Drop:</strong> Soul of the Blood of the Wolf</p>
                        <p class="card-text recompensa fw-bold">Almas: 20.000</p>
                    </div>
                </div>
            </article>
        </section>
    </main>

    <footer class="bg-black py-5 border-top border-dark mt-5">
        <div class="container text-center">
            <p class="text-secondary mb-3">Pedro Arthur - Matrícula 924367</p>
            <a href="https://www.instagram.com/ruthra_2x/" target="_blank" class="text-gold" style="font-size: 24px;">
                <i class="fab fa-instagram"></i>
            </a>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
